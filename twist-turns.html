<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twist & Turns - Gingersnaps</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div class="glitch-overlay"></div>
    
    <div class="game-container">
        <!-- Game Header -->
        <div class="game-header">
            <a href="../games.html" class="back-btn">← BACK</a>
            <h1 class="glitch-text" data-text="TWIST & TURNS">TWIST & TURNS</h1>
        </div>

        <!-- Game Content -->
        <div class="game-screen">
            <div class="story-display" id="storyDisplay">
                <!-- Story text will appear here -->
            </div>

            <div class="choices-container" id="choicesContainer">
                <!-- Choices will appear here -->
            </div>

            <div class="story-progress">
                <span id="progressText">PROGRESS: 0%</span>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="twist-turns.js"></script>
</body>
</html>
